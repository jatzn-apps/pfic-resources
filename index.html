<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PFIC — Resource Directory</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0D0D0D; font-family: 'DM Sans', sans-serif; color: #E8E4DE; min-height: 100vh; }
  .container { max-width: 900px; margin: 0 auto; padding: 32px 20px 60px; }
  .header { text-align: center; padding: 40px 0 28px; border-bottom: 1px solid #1E1E1E; margin-bottom: 24px; }
  .header-brand { font-size: 9px; letter-spacing: 5px; text-transform: uppercase; color: #C9A84C; font-weight: 600; margin-bottom: 10px; }
  .header-title { font-size: 28px; font-weight: 700; color: #FFF; margin-bottom: 6px; }
  .header-sub { font-size: 13px; color: #666; }
  .toolbar { display: flex; gap: 8px; margin-bottom: 24px; }
  .search-wrap { flex: 1; position: relative; }
  .search-wrap input { width: 100%; padding: 12px 16px 12px 40px; background: #141414; border: 1px solid #1E1E1E; border-radius: 8px; color: #FFF; font-size: 14px; outline: none; font-family: inherit; }
  .search-wrap input:focus { border-color: #C9A84C; }
  .search-wrap span { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #555; font-size: 16px; }
  .btn-add { padding: 12px 20px; background: #C9A84C; color: #0D0D0D; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; white-space: nowrap; }
  .btn-add.active { background: #333; color: #999; }
  .add-form { background: #141414; border: 1px solid #C9A84C; border-radius: 10px; padding: 20px; margin-bottom: 24px; display: none; }
  .add-form.show { display: block; }
  .add-form label { font-size: 11px; color: #666; display: block; margin-bottom: 4px; }
  .add-form input, .add-form select { width: 100%; padding: 10px; background: #0D0D0D; border: 1px solid #2A2520; border-radius: 6px; color: #FFF; font-size: 13px; font-family: inherit; margin-bottom: 10px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-row-wide { display: grid; grid-template-columns: 1fr 2fr; gap: 10px; }
  .form-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: #C9A84C; font-weight: 700; margin-bottom: 14px; }
  .btn-submit { padding: 10px 24px; background: #C9A84C; color: #0D0D0D; border: none; border-radius: 6px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .btn-submit:disabled { background: #333; color: #666; cursor: default; }
  .section-label { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: #C9A84C; font-weight: 700; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #1E1E1E; }
  .section-label span { color: #333; font-weight: 400; }
  .section { margin-bottom: 28px; }
  .resource { display: flex; align-items: flex-start; gap: 12px; padding: 12px 14px; background: #141414; border: 1px solid #1E1E1E; border-radius: 8px; margin-bottom: 6px; text-decoration: none; transition: border-color 0.2s; cursor: pointer; }
  .resource:hover { border-color: #C9A84C; }
  .resource-icon { width: 34px; height: 34px; min-width: 34px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #FFF; }
  .resource-content { flex: 1; min-width: 0; }
  .resource-title { font-size: 13px; font-weight: 600; color: #FFF; margin-bottom: 2px; }
  .resource-desc { font-size: 11px; color: #888; line-height: 1.4; }
  .resource-meta { display: flex; gap: 6px; margin-top: 4px; align-items: center; }
  .badge { font-size: 9px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; padding: 2px 7px; border-radius: 3px; }
  .resource-audience { font-size: 9px; color: #555; }
  .resource-arrow { color: #333; font-size: 16px; align-self: center; flex-shrink: 0; }
  .resource:hover .resource-arrow { color: #C9A84C; }
  .resource-delete { background: none; border: none; color: #333; font-size: 14px; cursor: pointer; align-self: center; padding: 4px; }
  .resource-delete:hover { color: #E74C3C; }
  .empty { text-align: center; padding: 40px; color: #444; }
  .empty div:first-child { font-size: 18px; margin-bottom: 8px; }
  .empty div:last-child { font-size: 13px; }
  .results-count { font-size: 12px; color: #555; margin-bottom: 16px; }
  .footer { text-align: center; padding-top: 24px; border-top: 1px solid #1E1E1E; margin-top: 16px; }
  .footer-text { font-size: 9px; color: #444; letter-spacing: 2px; text-transform: uppercase; }
  .footer-logo { font-size: 11px; color: #C9A84C; font-weight: 700; letter-spacing: 3px; margin-top: 6px; }
  .btn-reset { margin-top: 12px; padding: 6px 14px; background: transparent; border: 1px solid #222; border-radius: 4px; color: #444; font-size: 10px; cursor: pointer; font-family: inherit; }
  .btn-reset:hover { border-color: #E74C3C; color: #E74C3C; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-brand">Profit Flywheel Inner Circle</div>
    <div class="header-title">Resource Directory</div>
    <div class="header-sub">SOPs, Handbooks, Guides, Templates & Walkthroughs</div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search resources...">
      <span>🔍</span>
    </div>
    <button class="btn-add" id="addBtn" onclick="toggleAdd()">+ Add New</button>
  </div>

  <div class="add-form" id="addForm">
    <div class="form-label">Add New Resource</div>
    <div class="form-row">
      <div><label>Section</label><select id="f-section" onchange="updateTypes()"></select></div>
      <div><label>Type</label><select id="f-type"></select></div>
    </div>
    <div><label>Resource Name *</label><input id="f-name" placeholder="e.g. Listing Creation SOP"></div>
    <div><label>Description</label><input id="f-desc" placeholder="Short description of what this resource covers"></div>
    <div class="form-row-wide">
      <div><label>Audience</label><input id="f-audience" placeholder="e.g. Coaches"></div>
      <div><label>Link *</label><input id="f-link" placeholder="https://..."></div>
    </div>
    <button class="btn-submit" onclick="addResource()">Add Resource</button>
  </div>

  <div id="resultsCount" class="results-count" style="display:none;"></div>
  <div id="content"></div>

  <div class="footer">
    <div class="footer-text">Profit Flywheel Inner Circle — Internal Resource Directory</div>
    <div class="footer-logo">PFIC</div>
    <button class="btn-reset" onclick="resetAll()">Reset to Default</button>
  </div>
</div>

<script>
const SECTIONS = ["Handbooks & SOPs","Onboarding Slides","Sheets & Templates","Claude Skills","Google Drive","Loom Walkthroughs"];
const TYPES = {"Handbooks & SOPs":["SOP","Guide","Handbook"],"Onboarding Slides":["Slides"],"Sheets & Templates":["Sheet","Template"],"Claude Skills":["Skill"],"Google Drive":["Folder"],"Loom Walkthroughs":["Loom"]};
const TYPE_COLORS = {SOP:"#C9A84C",Guide:"#C9A84C",Handbook:"#C9A84C",Slides:"#3498DB",Sheet:"#27AE60",Template:"#27AE60",Skill:"#E74C3C",Folder:"#F39C12",Loom:"#625DF5"};

const DEFAULT_RESOURCES = [
  {id:"1",section:"Handbooks & SOPs",type:"SOP",name:"Fulfilment Team Handbook",desc:"Overview of offers, team responsibilities, student journey, systems, communication standards, escalation, weekly rhythm, and key rules.",audience:"All Team",link:"https://drive.google.com/file/d/18LXCbiHiy1W0G4VIgZgqCF1cIBLGhGIu/view?usp=sharing"},
  {id:"2",section:"Handbooks & SOPs",type:"SOP",name:"Member Onboarding SOP",desc:"Step-by-step onboarding process — WhatsApp handoff, onboarding call, Discord migration, folder setup.",audience:"CSM",link:"https://drive.google.com/file/d/1rd1tNXBOpb82QnRa06JXaB5lp8fjdkjy/view?usp=sharing"},
  {id:"3",section:"Handbooks & SOPs",type:"SOP",name:"CRM Data Entry & Student Tracking SOP",desc:"How CSMs and coaches use the CRM — fields, stages, call logging, weekly responsibilities.",audience:"CSM & Coaches",link:"https://drive.google.com/file/d/1zg9hKnddVrls_nyXU82I1a-IJK1ljgbf/view?usp=sharing"},
  {id:"4",section:"Handbooks & SOPs",type:"SOP",name:"PPC Manager SOP",desc:"Weekly PPC review — update P&L tracker, optimise, record Loom, post in Discord, log in Airtable.",audience:"PPC Manager",link:"https://drive.google.com/file/d/1bxdGVttvGalta_ZhVPgrERHJ9v-OFERy/view?usp=sharing"},
  {id:"5",section:"Handbooks & SOPs",type:"SOP",name:"Monthly Report Creation SOP",desc:"Generate monthly reports using Claude — download tracker, upload, review, send.",audience:"Coaches",link:"https://drive.google.com/file/d/1M78B7uquATzvQkcrawEYaCglF77vOfFN/view?usp=sharing"},
  {id:"6",section:"Handbooks & SOPs",type:"Guide",name:"Weekly Research Hour — Host Guide",desc:"Implementation session structure — live demo, set task, silent work, wrap up. Scripts included.",audience:"Host",link:"https://drive.google.com/file/d/1M78B7uquATzvQkcrawEYaCglF77vOfFN/view?usp=sharing"},
  {id:"7",section:"Handbooks & SOPs",type:"Guide",name:"Claude Skill Installation Guide",desc:"Install Claude skills into a project — 4 steps, 2 minutes, one-time setup.",audience:"Coaches",link:"https://drive.google.com/file/d/19FjOtRNaDFLCxDP7yFcxDPOh76uXEbtY/view?usp=sharing"},
  {id:"8",section:"Onboarding Slides",type:"Slides",name:"Onboarding Call Slides — Foundation",desc:"Canva slides used by CSM during Foundation onboarding calls.",audience:"CSM",link:"https://canva.link/4085d3l597mjm0n"},
  {id:"9",section:"Onboarding Slides",type:"Slides",name:"Onboarding Call Slides — Elite",desc:"Canva slides used by CSM during Elite onboarding calls.",audience:"CSM",link:"https://canva.link/ltg9yoq5xr4555l"},
  {id:"10",section:"Sheets & Templates",type:"Sheet",name:"Internal Product Research Tracker",desc:"Product Research VA fills in data. Coach reviews and approves for student allocation.",audience:"Internal",link:"https://docs.google.com/spreadsheets/d/1mby45bGRj-abyBAyok5J4GOYV_3Q9Lg4thokRyFC8pI/edit?usp=sharing"},
  {id:"11",section:"Sheets & Templates",type:"Sheet",name:"Student Product Feedback — White Label",desc:"Students fill in product data and 8-point checklist. All checks must PASS.",audience:"Student Facing",link:"https://docs.google.com/spreadsheets/d/1prjX4YPE_Bn7cAPNGPLPKsMVVa-XB13zL8I7P9kHG7o/edit?usp=sharing"},
  {id:"12",section:"Sheets & Templates",type:"Sheet",name:"Student Product Feedback — Wholesale",desc:"Students fill in wholesale data and 5-point checklist.",audience:"Student Facing",link:"https://docs.google.com/spreadsheets/d/1y32PS-3NIYS7cazdlVjFTy4mWsSXFTY_-ELTzTk_anI/edit?usp=sharing"},
  {id:"13",section:"Sheets & Templates",type:"Sheet",name:"Product P&L Tracker — UK",desc:"Unit economics with VAT (Tab 1), weekly tracker (Tab 2), dashboard (Tab 3).",audience:"Coach Weekly",link:"https://docs.google.com/spreadsheets/d/1EtG2-u6WSvVEfWppNzT7MuaZ6FcNbvx_IjiLfy-KVH4/edit?usp=sharing"},
  {id:"14",section:"Sheets & Templates",type:"Sheet",name:"Product P&L Tracker — US",desc:"Same as UK without VAT. Currency in $.",audience:"Coach Weekly",link:"https://docs.google.com/spreadsheets/d/1TQL6mWaJJxlfiDzc3TqZCfqlHNY0GN23J3WercM0yz0/edit?usp=sharing"},
  {id:"15",section:"Claude Skills",type:"Skill",name:"Monthly Report Skill",desc:"Generates branded monthly business reports. Upload P&L tracker, tell Claude student and month.",audience:"Coaches",link:"https://docs.google.com/document/d/1B-El3zGBzEN59dh2-JdJSVvIRoO21ZPCWHIiNXFu2NM/edit?usp=sharing"},
  {id:"16",section:"Claude Skills",type:"Skill",name:"Product Opportunity Report Skill",desc:"Generates one-page product reports for Elite and Incubator students.",audience:"Coaches",link:"https://docs.google.com/document/d/11SvW3zcBlFHUZ3RLkvZGNYcVFgAGCYVsMqXk0_uxY8Q/edit?usp=sharing"},
  {id:"17",section:"Google Drive",type:"Folder",name:"Student Google Drive Folders",desc:"Master folder — Foundation, Elite, Incubator + template folder with UK/US sheets.",audience:"All Tiers",link:"https://drive.google.com/drive/folders/1Ole3RXG7zwBdC1WSava1iZsKyohCQ9gX?usp=sharing"},
  {id:"18",section:"Loom Walkthroughs",type:"Loom",name:"Complete CRM Overview",desc:"Full walkthrough of every CRM field and who fills it.",audience:"All Team",link:"https://www.loom.com/share/73927bb62318423eb037b96e3d177d48"},
  {id:"19",section:"Loom Walkthroughs",type:"Loom",name:"CRM for Coaches",desc:"Coach-specific guide — fields, stages, filtered views.",audience:"Coaches",link:"https://www.loom.com/share/817abe50c46a449cb7000c0213eef783"},
  {id:"20",section:"Loom Walkthroughs",type:"Loom",name:"Google Drive Walkthrough — Foundation",desc:"How to set up and navigate the Foundation folder.",audience:"CSM",link:"https://www.loom.com/share/9fa95d0e94c041d2bf32a35027a8e31e"},
  {id:"21",section:"Loom Walkthroughs",type:"Loom",name:"Google Drive Walkthrough — Elite",desc:"How to set up and navigate the Elite folder.",audience:"CSM",link:"https://www.loom.com/share/a34834ae880547268eb709e283855018"},
  {id:"22",section:"Loom Walkthroughs",type:"Loom",name:"Google Drive Walkthrough — Incubator",desc:"How to set up and navigate the Incubator folder.",audience:"CSM",link:"https://www.loom.com/share/1496585b4f1243cbb2f4a877f23c9a24"}
];

let resources = JSON.parse(localStorage.getItem("pfic-resources")) || [...DEFAULT_RESOURCES];

function save() { localStorage.setItem("pfic-resources", JSON.stringify(resources)); }

function getInitials(name) {
  return name.split(" ").map(w => w[0]).join("").slice(0,2).toUpperCase();
}

function render() {
  const q = document.getElementById("searchInput").value.toLowerCase();
  const filtered = resources.filter(r => !q || r.name.toLowerCase().includes(q) || r.desc.toLowerCase().includes(q) || r.type.toLowerCase().includes(q) || r.audience.toLowerCase().includes(q) || r.section.toLowerCase().includes(q));

  const rc = document.getElementById("resultsCount");
  if (q) { rc.style.display = "block"; rc.textContent = `${filtered.length} result${filtered.length!==1?"s":""} for "${q}"`; }
  else { rc.style.display = "none"; }

  let html = "";
  SECTIONS.forEach(sec => {
    const items = filtered.filter(r => r.section === sec);
    if (items.length === 0) return;
    html += `<div class="section"><div class="section-label">${sec} <span>(${items.length})</span></div>`;
    items.forEach(r => {
      const c = TYPE_COLORS[r.type] || "#C9A84C";
      const icon = r.type === "Loom" ? "▶" : getInitials(r.name);
      html += `<div class="resource" onclick="window.open('${r.link}','_blank')">
        <div class="resource-icon" style="background:${c}">${icon}</div>
        <div class="resource-content">
          <div class="resource-title">${r.name}</div>
          <div class="resource-desc">${r.desc}</div>
          <div class="resource-meta">
            <span class="badge" style="background:${c}22;color:${c}">${r.type}</span>
            <span class="resource-audience">${r.audience}</span>
          </div>
        </div>
        <button class="resource-delete" onclick="event.stopPropagation();deleteResource('${r.id}')" title="Remove">✕</button>
        <div class="resource-arrow">→</div>
      </div>`;
    });
    html += "</div>";
  });

  if (filtered.length === 0) {
    html = '<div class="empty"><div>No resources found</div><div>Try a different search term or add a new resource</div></div>';
  }

  document.getElementById("content").innerHTML = html;
}

function toggleAdd() {
  const form = document.getElementById("addForm");
  const btn = document.getElementById("addBtn");
  const showing = form.classList.toggle("show");
  btn.textContent = showing ? "Cancel" : "+ Add New";
  btn.classList.toggle("active", showing);
}

function updateTypes() {
  const sec = document.getElementById("f-section").value;
  const typeSelect = document.getElementById("f-type");
  typeSelect.innerHTML = "";
  (TYPES[sec]||["SOP"]).forEach(t => { const o = document.createElement("option"); o.value = t; o.textContent = t; typeSelect.appendChild(o); });
}

function addResource() {
  const name = document.getElementById("f-name").value.trim();
  const link = document.getElementById("f-link").value.trim();
  if (!name || !link) return;
  resources.push({
    id: Date.now().toString(),
    section: document.getElementById("f-section").value,
    type: document.getElementById("f-type").value,
    name: name,
    desc: document.getElementById("f-desc").value.trim(),
    audience: document.getElementById("f-audience").value.trim(),
    link: link
  });
  save(); render();
  document.getElementById("f-name").value = "";
  document.getElementById("f-desc").value = "";
  document.getElementById("f-audience").value = "";
  document.getElementById("f-link").value = "";
  toggleAdd();
}

function deleteResource(id) {
  if (!confirm("Remove this resource?")) return;
  resources = resources.filter(r => r.id !== id);
  save(); render();
}

function resetAll() {
  if (!confirm("Reset to default resources? Any added resources will be removed.")) return;
  resources = [...DEFAULT_RESOURCES];
  save(); render();
}

// Init
const secSelect = document.getElementById("f-section");
SECTIONS.forEach(s => { const o = document.createElement("option"); o.value = s; o.textContent = s; secSelect.appendChild(o); });
updateTypes();
document.getElementById("searchInput").addEventListener("input", render);
render();
</script>
</body>
</html>
